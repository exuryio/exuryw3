name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: yarn install --frozen-lockfile && yarn build && ls -la dist/assets/
        env:
          VITE_INVEST_LEADS_EMAIL: ${{ secrets.VITE_INVEST_LEADS_EMAIL }}
          VITE_SCHEDULING_URL: ${{ secrets.VITE_SCHEDULING_URL }}
          VITE_BANK_BENEFICIARY: ${{ secrets.VITE_BANK_BENEFICIARY }}
          VITE_BANK_IBAN: ${{ secrets.VITE_BANK_IBAN }}
          VITE_BANK_NAME: ${{ secrets.VITE_BANK_NAME }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EXURYDEV }}
          projectId: exurydev