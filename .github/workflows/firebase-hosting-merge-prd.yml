name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: yarn install --frozen-lockfile && yarn build
        env:
          VITE_INVEST_LEADS_EMAIL: ${{ secrets.VITE_INVEST_LEADS_EMAIL }}
          VITE_SCHEDULING_URL: ${{ secrets.VITE_SCHEDULING_URL }}
          VITE_BANK_BENEFICIARY: ${{ secrets.VITE_BANK_BENEFICIARY }}
          VITE_BANK_IBAN: ${{ secrets.VITE_BANK_IBAN }}
          VITE_BANK_NAME: ${{ secrets.VITE_BANK_NAME }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EXURYIO }}
          channelId: live
          projectId: exuryio