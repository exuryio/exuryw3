<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" style="background: transparent;">
  <defs>
    <linearGradient id="wisdomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BB72;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#054629;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  <!-- Lightbulb with 3D effect -->
  <!-- Bulb -->
  <circle cx="48" cy="50" r="20" fill="url(#wisdomGrad)"/>
  <circle cx="48" cy="50" r="15" fill="#00BB72" opacity="0.2"/>
  <!-- Base -->
  <rect x="42" y="70" width="12" height="8" rx="2" fill="url(#wisdomGrad)"/>
  <!-- Filament -->
  <path d="M 48 45 Q 45 50 48 55 Q 51 50 48 45" fill="none" stroke="#00BB72" stroke-width="2" opacity="0.4"/>
  <!-- Light rays -->
  <line x1="48" y1="30" x2="48" y2="20" stroke="#00BB72" stroke-width="2" opacity="0.3"/>
  <line x1="30" y1="50" x2="20" y2="50" stroke="#00BB72" stroke-width="2" opacity="0.3"/>
  <line x1="66" y1="50" x2="76" y2="50" stroke="#00BB72" stroke-width="2" opacity="0.3"/>
</svg>

