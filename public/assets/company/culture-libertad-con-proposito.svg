<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" style="background: transparent;">
  <defs>
    <linearGradient id="freedomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BB72;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#054629;stop-opacity:0.12" />
    </linearGradient>
  </defs>
  <!-- Unlocked lock with 3D effect -->
  <rect x="30" y="40" width="36" height="30" rx="4" fill="url(#freedomGrad)"/>
  <!-- Lock body -->
  <rect x="32" y="42" width="32" height="26" rx="2" fill="#00BB72" opacity="0.2"/>
  <!-- Keyhole -->
  <circle cx="48" cy="55" r="4" fill="#E5E5E5" opacity="0.3"/>
  <rect x="46" y="55" width="4" height="8" fill="#E5E5E5" opacity="0.3" rx="1"/>
  <!-- Shackle (open) -->
  <path d="M 38 40 Q 38 25 48 25 Q 58 25 58 40" fill="none" stroke="#00BB72" stroke-width="3" opacity="0.4"/>
  <!-- Arrow pointing up (freedom) -->
  <path d="M 48 15 L 42 25 L 48 20 L 54 25 Z" fill="#00BB72" opacity="0.4"/>
</svg>

