<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" style="background: transparent;">
  <defs>
    <linearGradient id="transformGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BB72;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#054629;stop-opacity:0.12" />
    </linearGradient>
  </defs>
  <!-- Globe/World symbol with 3D effect -->
  <ellipse cx="64" cy="64" rx="50" ry="35" fill="url(#transformGrad)"/>
  <!-- Latitude lines -->
  <ellipse cx="64" cy="64" rx="50" ry="35" fill="none" stroke="#00BB72" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="64" cy="50" rx="40" ry="25" fill="none" stroke="#00BB72" stroke-width="1" opacity="0.2"/>
  <ellipse cx="64" cy="78" rx="40" ry="25" fill="none" stroke="#00BB72" stroke-width="1" opacity="0.2"/>
  <!-- Longitude lines -->
  <path d="M 14 64 Q 64 50 114 64" fill="none" stroke="#00BB72" stroke-width="1" opacity="0.2"/>
  <path d="M 14 64 Q 64 78 114 64" fill="none" stroke="#00BB72" stroke-width="1" opacity="0.2"/>
  <line x1="64" y1="29" x2="64" y2="99" stroke="#00BB72" stroke-width="1.5" opacity="0.3"/>
  <!-- Growth arrows -->
  <path d="M 80 45 L 95 50 L 80 55 Z" fill="#00BB72" opacity="0.4"/>
  <path d="M 48 83 L 33 78 L 48 73 Z" fill="#00BB72" opacity="0.4"/>
</svg>

