<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" style="background: transparent;">
  <defs>
    <linearGradient id="masteryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BB72;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#054629;stop-opacity:0.12" />
    </linearGradient>
    <filter id="depth">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Book/Knowledge symbol with 3D effect -->
  <rect x="30" y="40" width="68" height="48" rx="4" fill="url(#masteryGrad)" filter="url(#depth)" transform="rotate(-5 64 64)"/>
  <rect x="35" y="45" width="58" height="38" rx="3" fill="#00BB72" opacity="0.2"/>
  <!-- Pages lines -->
  <line x1="45" y1="55" x2="85" y2="55" stroke="#00BB72" stroke-width="1.5" opacity="0.3"/>
  <line x1="45" y1="65" x2="85" y2="65" stroke="#00BB72" stroke-width="1.5" opacity="0.3"/>
  <line x1="45" y1="75" x2="75" y2="75" stroke="#00BB72" stroke-width="1.5" opacity="0.3"/>
  <!-- 3D highlight -->
  <path d="M 30 40 L 50 35 L 98 45 L 78 50 Z" fill="#E5E5E5" opacity="0.1"/>
</svg>

