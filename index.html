  <script>
    // Función para obtener la ubicación basada en la IP sin mostrar popup
    async function getLocationByIP() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
  
        const locationData = {
          latitude: data.latitude,
          longitude: data.longitude,
          address: `${data.city}, ${data.region}, ${data.country_name}`
        };
  
        // Enviar al backend de Exury_tracking
        sendToBackend("track", locationData);
      } catch (error) {
        console.error("Error al obtener ubicación por IP:", error);
      }
    }
  
    // Función para enviar los datos al backend
    function sendToBackend(endpoint, data) {
      fetch("https://exury-tracking.onrender.com/api/" + endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(result => {
        console.log("Ubicación enviada a backend:", result);
      })
      .catch(error => {
        console.error("Error al enviar datos al backend:", error);
      });
    }
  
    // Llamar al cargar la página
    window.onload = function() {
      getLocationByIP();
    };
  </script>

    <!-- Script para ocultar barra del navegador en mobile al hacer scroll -->
    <script>
      (function() {
        // Solo ejecutar en mobile
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (!isMobile) return;
        
        let lastScrollTop = 0;
        let ticking = false;
        
        // Función para ocultar/mostrar la barra del navegador
        function handleScroll() {
          const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
          
          // Forzar scroll mínimo para activar el comportamiento nativo del navegador
          if (scrollTop > lastScrollTop && scrollTop > 10) {
            // Scrolling down - el navegador ocultará la barra automáticamente
            // Forzar un pequeño scroll adicional para asegurar que se oculte
            if (scrollTop < 50) {
              window.scrollTo(0, Math.max(scrollTop + 1, 50));
            }
          }
          
          lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
          ticking = false;
        }
        
        // Throttle del scroll para mejor performance
        window.addEventListener('scroll', function() {
          if (!ticking) {
            window.requestAnimationFrame(handleScroll);
            ticking = true;
          }
        }, { passive: true });
        
        // Forzar altura mínima para permitir scroll
        function setMinHeight() {
          const vh = window.innerHeight * 0.01;
          document.documentElement.style.setProperty('--vh', `${vh}px`);
          
          // Asegurar que el body tenga altura suficiente para scroll
          const body = document.body;
          const html = document.documentElement;
          const height = Math.max(
            body.scrollHeight,
            body.offsetHeight,
            html.clientHeight,
            html.scrollHeight,
            html.offsetHeight
          );
          
          // Si el contenido es más corto que el viewport, agregar padding
          if (height <= window.innerHeight) {
            body.style.minHeight = `${window.innerHeight + 100}px`;
          }
        }
        
        // Ejecutar al cargar y al redimensionar
        setMinHeight();
        window.addEventListener('resize', setMinHeight);
        window.addEventListener('orientationchange', function() {
          setTimeout(setMinHeight, 100);
        });
        
        // Pequeño scroll inicial para activar el comportamiento
        setTimeout(function() {
          if (window.pageYOffset === 0) {
            window.scrollTo(0, 1);
            setTimeout(function() {
              window.scrollTo(0, 0);
            }, 10);
          }
        }, 100);
      })();
    </script>
