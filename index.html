    <!-- Cookiebot solo en producción para no bloquear la app en previews/PR (dominio no autorizado) -->

      (function() {
        var h = window.location.hostname || '';
        if (h === 'exury.io' || h === 'www.exury.io') {
          var s = document.createElement('script');
          s.id = 'Cookiebot';
          s.src = 'https://consent.cookiebot.com/uc.js';
          s.setAttribute('data-cbid', '85e40a95-9a9c-473a-9775-bdd34899ef02');
          s.setAttribute('data-blockingmode', 'auto');
          s.type = 'text/javascript';
          document.head.appendChild(s);
        }
      })();
    </script>

  <script>
    // Ubicación por IP (tracking): no bloquea la app si falla (CORS en algunos dominios)
    function getLocationByIP() {
      fetch('https://ipapi.co/json/')
        .then(function(res) { return res.json(); })
        .then(function(data) {
          var payload = {
            latitude: data.latitude,
            longitude: data.longitude,
            address: (data.city || '') + ', ' + (data.region || '') + ', ' + (data.country_name || '')
          };
          fetch('https://exury-tracking.onrender.com/api/track', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          }).catch(function() {});
        })
        .catch(function() {});
    }
    if (window.addEventListener) {
      window.addEventListener('load', getLocationByIP);
    } else {
      window.onload = getLocationByIP;
    }
  </script>
